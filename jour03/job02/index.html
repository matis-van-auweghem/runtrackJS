<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 03 - Job 02</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <h1>Job 02</h1>
    <p class="intro">
      Dans cet exercice, six images s'assemblent pour former un arc-en-ciel.
      Il faut les mélanger puis les remettre dans le bon ordre.
    </p>

    <button id="shuffleBtn" class="btn">Mélanger l'arc-en-ciel</button>

    <section id="rainbow" class="rainbow">
      <div class="piece" draggable="true" data-order="1"><img src="./images/arc1.png" alt="arc 1"></div>
      <div class="piece" draggable="true" data-order="2"><img src="./images/arc2.png" alt="arc 2"></div>
      <div class="piece" draggable="true" data-order="3"><img src="./images/arc3.png" alt="arc 3"></div>
      <div class="piece" draggable="true" data-order="4"><img src="./images/arc4.png" alt="arc 4"></div>
      <div class="piece" draggable="true" data-order="5"><img src="./images/arc5.png" alt="arc 5"></div>
      <div class="piece" draggable="true" data-order="6"><img src="./images/arc6.png" alt="arc 6"></div>
    </section>

    <p id="message" class="message"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
